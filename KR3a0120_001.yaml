body:
  text: 杜氏體論人倫之大綱莫重於君臣立身之基本莫大於言行安上理民莫精於政法勝殘去殺莫善於用兵夫禮也者萬物之體也萬物皆得其體無有不善故謂之體論裴松之魏志杜恕傳注引杜氏新書不動如山難知如陰人有厚德無問小節人有大舉無訾小故隋侯之珠不能無纇馬總意林卷五夫人臣猶土也萬物載焉而不辭其重水瀆污焉而不辭其下草木殖焉而不有其功夫行者榮辱之皂白君子居必選鄉遊必擇士至人之治也處國於不傾之地積政於萬全之鄉載德於不止之輿行令於無竭之倉使民於不爭之塗開法於必得之方庶民水也君子舟也水所以載舟亦所以覆舟恕性疏惰但飽食而已家有書傳頗嘗涉歷父憂行喪在禮多愆孝聲不聞後除中郎又作黃門郎同朝友人問余志余答曰見大臣議論或黨甲苦乙所親或黨乙謗甲所親余處甲乙之間幸無毀譽耳並同上束修之業其上在於不言其次莫如不知也故諺曰使口如鼻至老不失歐陽詢藝文類聚卷十七天生五材民並用之廢一不可誰能去兵故兵之來也久矣所以威不軌而昭文德所以討強暴而除殘賊也聖人以興亂人以廢廢興存亡皆兵之由也昔五帝不能偃況衰世乎太平御覽卷二百七十一濫殺無辜之民以養不義之君非兵之體也殫天下之財以贍一人之求非兵之體也怙其率卒之強矜其變詐之謀欲以立威成名非兵之體也故夫霸王之用兵也始之以義終之以仁將以存亡非以亡存也將以禁暴非以為暴也兵之來也以除不義而授德克其國不傷其民廢其君而不易其政尊其俊秀顯其賢良賑其孤寡恤其窮困百姓聞之欣然簞食壺漿以迎其君奚之遲也以湯武之師用兵上也誰與交鋒而接刃哉所謂善用兵者先弱敵而後戰者也若乃征之以義以責其過振之以武以威其淫懷之以德以誓其民置之以仁以救其危此四者用兵之體所謂因民之欲乘民之力也治國家理境內施仁義布德惠明勸賞黜幽昧功臣附親士卒和輯上下一心君臣同德指麾而響應此上兵之體也地廣民衆主賢將能國富賞罰信未及兵而敵人亡遁此次兵之體也知地之形因險厄之利明奇正之變審進退之宜援枹而鼓之黃塵四起乃以決勝此用兵之下非兵之體也夫德義足以懷天下之民事業足以當天下之急選舉足以得賢才之用則兵之所加若徑風振稿此兵之體也並同上可以使鬼者錢也可以使神者誠也太平御覽卷八百三十六
